<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persona Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="home">
    <div class="home-card">
      <h1 id="app-title">Ask me about tech</h1>
      <p id="app-subtitle" class="home-subtitle">Pick a persona to start chatting</p>

      <div class="persona-grid" id="persona-grid">
        <!-- Persona circles are rendered here by script.js from the PERSONAS config -->
      </div>
      
      <p class="home-disclaimer">*These are AI personas inspired by public personas — not the real individuals.</p>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    renderHomePage();
  </script>
</body>
</html>
